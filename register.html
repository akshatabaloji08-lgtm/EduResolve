<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration — CampusCare</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="logo-wrap">
        <img src="dsce_logo.jpg" alt="DSCE Logo">
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Register to submit and track complaints</p>

    <form action="register.php" method="POST" id="regForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. Priya Sharma" required autocomplete="name">
        </div>
        <div class="form-group">
            <label>USN</label>
            <input type="text" name="usn" placeholder="e.g. 1DS21CS001" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" placeholder="e.g. Computer Science" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
    </form>

    <div class="auth-links">
        Already have an account? <a href="login.php">Sign in</a>
    </div>
</div>
<script>
document.getElementById('regForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Registering…';
    btn.disabled = true;
});
</script>
</body>
</html>
